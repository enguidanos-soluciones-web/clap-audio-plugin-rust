<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                width: 100%;
                height: 100%;
            }

            body {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 24px;
            }

            .knob {
                width: 80px;
                height: 80px;
            }

            .parameter {
                display: grid;
                gap: 24px;
                align-items: center;
                place-items: center;
            }

            .parameter-label {
                color: white;
                text-align: center;
            }
        </style>
    </head>

    <body>
        <div class="parameter">
            <span class="parameter-label">Input</span>
            <div id="input-gain" class="knob"></div>
        </div>

        <div class="parameter">
            <span class="parameter-label">Output</span>
            <div id="output-gain" class="knob"></div>
        </div>
    </body>
</html>
