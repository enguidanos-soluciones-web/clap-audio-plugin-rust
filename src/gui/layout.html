<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            }

            body {
                display: flex;
                flex-direction: column;
                background-color: #1C1C1E;
                color: #E0E0E0;
            }

            .header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 12px 20px;
                background-color: #111113;
                border-bottom: 1px solid #2A2A2E;
            }

            .plugin-name {
                font-size: 13px;
                font-weight: 700;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: #BE6428;
            }

            .model-rate {
                font-size: 11px;
                font-weight: 400;
                color: #888;
                letter-spacing: 0.04em;
            }

            .controls {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 40px;
            }

            .knob {
                width: 80px;
                height: 80px;
            }

            .parameter {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }

            .parameter-label {
                font-size: 10px;
                font-weight: 600;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: #888;
            }
        </style>
    </head>

    <body>
        <div class="header">
            <span class="plugin-name">NAM Player</span>
            <span class="model-rate">Model rate: {{MODEL_RATE}} Hz</span>
        </div>

        <div class="controls">
            <div class="parameter">
                <div id="input-gain" class="knob"></div>
                <span class="parameter-label">Gain</span>
            </div>

            <div class="parameter">
                <div id="output-gain" class="knob"></div>
                <span class="parameter-label">Master</span>
            </div>
        </div>
    </body>
</html>
